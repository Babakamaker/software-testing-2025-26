services:
  postgres:
    image: postgres:17-alpine
    container_name: movielibrary-postgres
    environment:
      POSTGRES_DB: movielibrary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movielibrary"]
      interval: 5s
      timeout: 5s
      retries: 10
