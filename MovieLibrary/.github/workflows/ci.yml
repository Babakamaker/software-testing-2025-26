name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore MovieLibrary.slnx

      - name: Unit tests
        run: dotnet test tests/MovieLibrary.UnitTests/MovieLibrary.UnitTests.csproj --no-restore --configuration Release --logger "trx;LogFileName=unit-tests.trx"

      - name: Integration tests
        run: dotnet test tests/MovieLibrary.IntegrationTests/MovieLibrary.IntegrationTests.csproj --no-restore --configuration Release --logger "trx;LogFileName=integration-tests.trx"

      - name: Database tests
        run: dotnet test tests/MovieLibrary.DatabaseTests/MovieLibrary.DatabaseTests.csproj --no-restore --configuration Release --logger "trx;LogFileName=database-tests.trx"
